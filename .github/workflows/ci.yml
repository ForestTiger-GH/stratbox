name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,pdf]"
      - name: Integrity
        run: python scripts/check_release_integrity.py
      - name: Import smoke
        run: python scripts/check_internal_imports.py
      - name: Pytest
        run: pytest -q
